# 1. Port Configuration (Render uses the PORT env var)
server.port=${PORT:8080}

# 2. Supabase Connection (Using the Transaction Pooler)
# Note: Render often provides the full JDBC URL in one variable
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# 3. Connection Pooling (Critical for Free Tier)
# Limits the number of active connections to save Supabase resources
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

# 4. JPA & Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Fixes potential issues with Supabase's Supavisor
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# 5. Optimization for 512MB RAM
server.tomcat.threads.max=10
spring.main.banner-mode=off